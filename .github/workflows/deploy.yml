name: Deploy — Maker AI (fofus.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Vercel auto-deploys via its GitHub App on every push — no job needed.

  # Railway CLI fallback — activates when RAILWAY_TOKEN secret is set.
  # Railway's GitHub App also auto-deploys on push if the repo is connected.
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Runs from repo root — Dockerfile and railway.toml live here
        # Skips gracefully if RAILWAY_TOKEN secret is not configured
        run: |
          test -n "$RAILWAY_TOKEN" || { echo "RAILWAY_TOKEN not set — skipping"; exit 0; }
          railway up \
            --project d8f71a07-6890-431b-8e99-425d5bcd97f8 \
            --environment production \
            --detach
