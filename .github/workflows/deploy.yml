name: Deploy — Maker AI (fofus.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Vercel auto-deploys via its GitHub App on every push — no job needed.

  # Railway CLI fallback — activates when RAILWAY_TOKEN secret is set.
  # Railway's GitHub App also auto-deploys on push if the repo is connected.
  deploy-backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    # Skip if token is not configured
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Run from root — Dockerfile and railway.toml are here
        run: |
          railway up \
            --environment production \
            --detach
