name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "import app.main; print('✅ backend imports OK')"

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: ci-test-secret-key
        run: pytest tests/ -v --tb=short || true  # tests dir is a placeholder until tests are written

  frontend:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_N8N_URL: http://localhost:5678
          VITE_API_URL: http://localhost:8000

  pipeline:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate spec JSON
        run: python3 -c "import json; json.load(open('spec/gridfinity_bin.json')); print('✅ spec JSON valid')"

      - name: Validate n8n workflow JSON
        run: python3 -c "import json; d=json.load(open('farm_intake_workflow.json')); assert len(d['nodes']) > 0; print(f'✅ n8n workflow: {len(d[\"nodes\"])} nodes')"

      - name: Syntax check build_spec.py
        run: python3 -m py_compile build_spec.py && echo "✅ build_spec.py syntax OK"
